<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style_2.css">
<head>
    <meta charset="UTF-8">
    <title>Traffic light</title>
</head>
<body>

<h2>Світлофор</h2>

<div class="traffic">

    <div id="red" class="light"></div>
    <div id="yellow" class="light"></div>
    <div id="green" class="light"></div>

</div>

<p id="stateText">Стан: червоний</p>

<br>

<button onclick="startTraffic()">Запустити світлофор</button>
<button onclick="nextState()">Наступний стан</button>
<button onclick="changeTime()">Змінити час</button>

<script src="script_2.js"></script>

</body>
</html>
