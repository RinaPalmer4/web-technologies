<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style_3.css">
<head>
    <meta charset="UTF-8">
    <title>Data and time</title>
</head>
<body>
<h2>Часікі</h2>
<div id="clock-box">
    <span id="hours"></span>
    <span id="colon">:</span>
    <span id="minutes"></span>
    <span id="colon2">:</span>
    <span id="seconds"></span>
</div>

<hr>

<h2>Таймер</h2>
<input type="datetime-local" id="timer-input">
<button id="btn-timer">Запустити таймер</button>
<p id="timer-result">Оберіть час для старту...</p>

<hr>

<h2>Календарік</h2>
<input type="month" id="calendar-input">

<p id="calendar-result"></p>

<hr>

<h2>Скільки до Дня народження?</h2>
<label>Оберіть дату народження (рік неважливий):</label>
<input type="date" id="bday-input">
<button id="btn-bday">Порахувати час</button>
<p id="bday-result"></p>

<script src="script_3.js"></script>
</body>
</html>
